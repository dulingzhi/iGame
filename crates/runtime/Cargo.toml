[package]
name        = "igame-runtime"
version.workspace    = true
edition.workspace    = true
license.workspace    = true
repository.workspace = true
description = "Bevy-based game runtime for iGame"

[[bin]]
name = "igame"
path = "src/main.rs"

[lib]
name = "igame_runtime"
path = "src/lib.rs"

[dependencies]
igame-shared = { path = "../shared" }

bevy = { version = "0.15", default-features = false, features = [
    "bevy_asset",
    "bevy_color",
    "bevy_core_pipeline",
    "bevy_pbr",
    "bevy_render",
    "bevy_sprite",
    "bevy_state",
    "bevy_text",
    "bevy_ui",
    "bevy_winit",
    "default_font",
    "multi_threaded",
    "png",
    "tonemapping_luts",
    "x11",
    "wayland",
] }

serde_json = { workspace = true }
toml       = { workspace = true }
log        = { workspace = true }

[dev-dependencies]
bevy = { version = "0.15", default-features = false, features = [
    "bevy_asset",
    "bevy_color",
    "bevy_pbr",
    "bevy_render",
    "bevy_sprite",
    "multi_threaded",
] }
