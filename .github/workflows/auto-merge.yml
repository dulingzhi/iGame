name: Auto Merge

# Trigger whenever a PR is labeled, marked ready, or new commits pushed.
# The job only runs when the `automerge` label is present and all safety
# conditions are met (same-repo branch, non-draft).  GitHub's native
# auto-merge feature is then enabled; the PR will be squash-merged once
# every required status check reports green.
on:
  pull_request:
    types:
      - labeled
      - unlabeled
      - ready_for_review
      - synchronize
      - opened
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto Merge
    runs-on: ubuntu-latest

    # Safety gate – ALL three conditions must be true:
    #   1. PR comes from a branch in THIS repository (not a fork).
    #   2. PR is not a draft.
    #   3. PR carries the `automerge` label.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'automerge')

    steps:
      - name: Enable GitHub native auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --auto \
            --squash \
            --delete-branch
