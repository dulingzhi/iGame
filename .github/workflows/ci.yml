name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libx11-dev \
            libxcb-composite0-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libx11-dev \
            libxcb-composite0-dev \
            libxi-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libvulkan-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm-build:
    name: WASM Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # Build the library crates that support WASM (no windowing required).
      - run: cargo build --package igame-shared --target wasm32-unknown-unknown
      - run: cargo build --package igame-ugc   --target wasm32-unknown-unknown
