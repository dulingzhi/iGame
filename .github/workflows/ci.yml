name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Default to read-only for all tokens; each job can escalate only what it needs.
permissions:
  contents: read

jobs:
  # ── 1. Formatting ──────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── 2. Linting ────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ── 3. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Run workspace tests
        run: cargo test --workspace

  # ── 4. wasm32-unknown-unknown build ───────────────────────────────────────
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32
          cache-on-failure: true
      # Build only the wasm32-compatible packages (editor is desktop-only).
      - name: Build igame-shared for wasm32
        run: cargo build --target wasm32-unknown-unknown -p igame-shared
      - name: Build igame-runtime for wasm32
        run: cargo build --target wasm32-unknown-unknown -p igame-runtime
